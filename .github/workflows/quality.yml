name: Quality

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: meduza_ci
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres@127.0.0.1:5432/meduza_ci
      STORE_CORS: http://127.0.0.1:8000
      ADMIN_CORS: http://127.0.0.1:9000
      AUTH_CORS: http://127.0.0.1:9000
      JWT_SECRET: ci-only-jwt-secret
      COOKIE_SECRET: ci-only-cookie-secret
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_test_ci
      MEDUSA_BACKEND_URL: http://127.0.0.1:9000
      NEXT_PUBLIC_BASE_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --verbose --foreground-scripts
        timeout-minutes: 10
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: npm run test:smoke
