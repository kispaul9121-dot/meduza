name: Quality

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: meduza_ci
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres@127.0.0.1:5432/meduza_ci
      STORE_CORS: http://127.0.0.1:8000
      ADMIN_CORS: http://127.0.0.1:9000
      AUTH_CORS: http://127.0.0.1:9000
      JWT_SECRET: ci-only-jwt-secret
      COOKIE_SECRET: ci-only-cookie-secret
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_test_ci
      NEXT_PUBLIC_BASE_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Regenerate corrected npm lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund --progress=false
      - name: Upload corrected npm lockfile
        uses: actions/upload-artifact@v4
        with:
          name: corrected-package-lock
          path: package-lock.json
          if-no-files-found: error
      - name: Install dependencies
        shell: bash
        run: |
          set +e
          npm ci --no-audit --no-fund --progress=false 2>&1 | tee npm-ci.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "npm ci failed with status $status"
            tail -n 120 npm-ci.log
          fi
          exit "$status"
        timeout-minutes: 25
      - name: Upload npm install diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-ci-diagnostics
          path: npm-ci.log
          if-no-files-found: ignore
      - name: Apply database migrations
        working-directory: apps/backend
        run: npx --no-install medusa db:migrate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - name: Production build
        env:
          MEDUSA_BACKEND_URL: http://127.0.0.1:9100
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://127.0.0.1:9100
        shell: bash
        run: |
          node apps/storefront/tests/smoke/mock-medusa.cjs > mock-medusa-build.log 2>&1 &
          MOCK_PID=$!
          trap 'kill "$MOCK_PID" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:9100/health > /dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Mock Medusa did not become ready"
              cat mock-medusa-build.log
              exit 1
            fi
            sleep 1
          done
          npm run build || {
            status=$?
            cat mock-medusa-build.log
            exit "$status"
          }
      - name: Storefront performance budgets
        working-directory: apps/storefront
        run: npm run perf:budget
      - name: Upload performance budget report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storefront-performance-budget
          path: apps/storefront/.next/performance-budget-report.json
          if-no-files-found: ignore
      - name: Browser smoke tests
        run: npm run test:smoke
